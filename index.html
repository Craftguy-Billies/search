<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoVault - YouTube Video Display</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        :root {
            --bg: #0f0f0f;
            --text: #fff;
            --card-bg: #1a1a1a;
            --card-border: #2a2a2a;
            --input-bg: #1a1a1a;
            --input-border: #333;
            --header-from: #1a1a2e;
            --header-mid: #16213e;
            --header-to: #0f3460;
            --header-shadow: rgba(0,0,0,0.5);
            --muted: #888;
            --muted-strong: #aaa;
            --muted-dim: #777;
            --btn-secondary-bg: #2d2d2d;
            --btn-secondary-hover: #3d3d3d;
            --toast-bg: #333;
            --empty-muted: #666;
        }

        :root.light {
            --bg: #f5f5f5;
            --text: #111;
            --card-bg: #fff;
            --card-border: #e0e0e0;
            --input-bg: #fff;
            --input-border: #ccc;
            --header-from: #ff6b6b;
            --header-mid: #ee5a24;
            --header-to: #f0932b;
            --header-shadow: rgba(0,0,0,0.15);
            --muted: #888;
            --muted-strong: #666;
            --muted-dim: #999;
            --btn-secondary-bg: #e0e0e0;
            --btn-secondary-hover: #d0d0d0;
            --toast-bg: #333;
            --empty-muted: #999;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        header {
            background: linear-gradient(135deg, var(--header-from) 0%, var(--header-mid) 50%, var(--header-to) 100%);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 30px var(--header-shadow);
            transition: background 0.3s, box-shadow 0.3s;
        }

        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24, #f0932b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            font-size: 28px;
            -webkit-text-fill-color: initial;
        }

        .search-container {
            flex: 1;
            display: flex;
            gap: 8px;
            min-width: 250px;
        }

        .search-container input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid var(--input-border);
            border-radius: 25px;
            background: var(--input-bg);
            color: var(--text);
            font-size: 15px;
            outline: none;
            transition: border 0.3s, background 0.3s, color 0.3s;
        }

        .search-container input:focus {
            border-color: #ff6b6b;
        }

        .search-container input::placeholder {
            color: var(--empty-muted);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: #fff;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(238, 90, 36, 0.4);
        }

        .btn-secondary {
            background: var(--btn-secondary-bg);
            color: var(--text);
        }

        .btn-secondary:hover {
            background: var(--btn-secondary-hover);
        }

        .btn-danger {
            background: #e74c3c;
            color: #fff;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 13px;
        }

        .theme-toggle {
            font-size: 20px;
            line-height: 1;
            padding: 8px 14px;
            min-width: 44px;
        }

        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .player-section {
            margin-bottom: 32px;
            display: none;
        }

        .player-section.active {
            display: block;
        }

        .player-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
        }

        .player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .player-info {
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 12px;
        }

        .player-info h2 {
            font-size: 22px;
            font-weight: 700;
            flex: 1;
        }

        .player-info .close-player {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 28px;
            cursor: pointer;
            padding: 0 8px;
            transition: color 0.3s;
        }

        .player-info .close-player:hover {
            color: var(--text);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .section-header h2 {
            font-size: 22px;
            font-weight: 700;
        }

        .section-header .count {
            color: var(--muted);
            font-size: 14px;
            font-weight: 400;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .video-card {
            background: var(--card-bg);
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s, background 0.3s, border-color 0.3s;
            border: 1px solid var(--card-border);
        }

        .video-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
            border-color: #ff6b6b44;
        }

        .video-thumbnail {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: var(--card-border);
            overflow: hidden;
        }

        .video-thumbnail img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .video-card:hover .video-thumbnail img {
            transform: scale(1.05);
        }

        .video-thumbnail .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: rgba(255,0,0,0.85);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .video-card:hover .play-overlay {
            opacity: 1;
        }

        .play-overlay::after {
            content: '';
            display: block;
            width: 0;
            height: 0;
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            border-left: 18px solid #fff;
            margin-left: 4px;
        }

        .video-thumbnail .duration {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.85);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .video-info {
            padding: 14px 16px 16px;
        }

        .video-info h3 {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .video-info .channel {
            font-size: 13px;
            color: var(--muted-strong);
            margin-bottom: 4px;
        }

        .video-info .meta {
            font-size: 12px;
            color: var(--muted-dim);
        }

        .video-actions {
            display: flex;
            gap: 6px;
            padding: 0 16px 14px;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--empty-muted);
        }

        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 24px;
            color: var(--muted-strong);
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 16px;
            max-width: 400px;
            margin: 0 auto 24px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--toast-bg);
            color: #fff;
            padding: 14px 24px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            transform: translateY(120px);
            opacity: 0;
            transition: all 0.4s;
            z-index: 1000;
            font-size: 14px;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--card-border);
            border-top: 4px solid #ff6b6b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .header-inner {
                flex-direction: column;
                align-items: stretch;
            }
            .video-grid {
                grid-template-columns: 1fr;
            }
            .player-info h2 {
                font-size: 18px;
            }
        }

        @media (max-width: 480px) {
            .header-inner { padding: 0 16px; }
            .main-content { padding: 16px; }
            .search-container { flex-direction: column; }
            .btn { text-align: center; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <div class="logo">
            <span class="logo-icon">▶</span> VideoVault
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Paste a YouTube URL (e.g. https://youtube.com/watch?v=...)" />
            <button class="btn btn-primary" id="addBtn">+ Add Video</button>
        </div>
        <button class="btn btn-secondary theme-toggle" id="themeToggle">☀️</button>
    </div>
</header>

<div class="main-content">
    <div class="player-section" id="playerSection">
        <div class="player-wrapper">
            <iframe id="playerIframe" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>
        <div class="player-info">
            <h2 id="playerTitle">Video Title</h2>
            <button class="close-player" id="closePlayer">&times;</button>
        </div>
    </div>

    <div class="section-header">
        <h2>Your Videos <span class="count" id="videoCount"></span></h2>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="btn btn-secondary btn-sm" id="refreshBtn">🔄 Refresh Thumbnails</button>
            <button class="btn btn-danger btn-sm" id="clearBtn">🗑 Clear All</button>
        </div>
    </div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p style="color:#888;">Loading video info...</p>
    </div>

    <div class="video-grid" id="videoGrid"></div>

    <div class="empty-state" id="emptyState">
        <div class="icon">🎬</div>
        <h3>No videos yet</h3>
        <p>Paste a YouTube URL above to add your first video. Your videos are saved in your browser!</p>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/app.js"></script>
<script>
    let videos = [];

    const grid = document.getElementById('videoGrid');
    const emptyState = document.getElementById('emptyState');
    const loading = document.getElementById('loading');
    const videoCount = document.getElementById('videoCount');
    const searchInput = document.getElementById('searchInput');
    const addBtn = document.getElementById('addBtn');
    const clearBtn = document.getElementById('clearBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const themeToggle = document.getElementById('themeToggle');
    const playerSection = document.getElementById('playerSection');
    const playerIframe = document.getElementById('playerIframe');
    const playerTitle = document.getElementById('playerTitle');
    const closePlayer = document.getElementById('closePlayer');
    const toastEl = document.getElementById('toast');

    function showToast(msg, duration = 3000) {
        toastEl.textContent = msg;
        toastEl.classList.add('show');
        clearTimeout(toastEl._hide);
        toastEl._hide = setTimeout(() => toastEl.classList.remove('show'), duration);
    }

    function render() {
        grid.innerHTML = '';
        videoCount.textContent = `(${videos.length})`;

        if (videos.length === 0) {
            emptyState.style.display = 'block';
            grid.style.display = 'none';
            return;
        }

        emptyState.style.display = 'none';
        grid.style.display = 'grid';

        videos.forEach((v, i) => {
            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `
                <div class="video-thumbnail" data-index="${i}">
                    <img src="${v.thumbnail || ''}" alt="${v.title}" loading="lazy"
                         onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22320%22 height=%22180%22><rect fill=%22%23333%22 width=%22320%22 height=%22180%22/><text fill=%22%23777%22 x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2214%22>No Thumbnail</text></svg>'">
                    <div class="play-overlay"></div>
                    ${v.duration ? `<span class="duration">${v.duration}</span>` : ''}
                </div>
                <div class="video-info">
                    <h3 title="${v.title}">${v.title}</h3>
                    <div class="channel">${v.author || 'Unknown'}</div>
                    <div class="meta">${v.published ? timeAgo(v.published) : ''}</div>
                </div>
                <div class="video-actions">
                    <button class="btn btn-danger btn-sm" data-remove="${i}">Remove</button>
                </div>
            `;

            const thumb = card.querySelector('.video-thumbnail');
            thumb.addEventListener('click', () => playVideo(i));

            const removeBtn = card.querySelector('[data-remove]');
            removeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                removeVideo(i);
            });

            grid.appendChild(card);
        });
    }

    function playVideo(index) {
        const v = videos[index];
        if (!v) return;
        playerIframe.src = `https://www.youtube.com/embed/${v.id}?autoplay=1`;
        playerTitle.textContent = v.title;
        playerSection.classList.add('active');
        playerSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    closePlayer.addEventListener('click', () => {
        playerSection.classList.remove('active');
        playerIframe.src = '';
    });

    async function addVideo(input) {
        const id = extractVideoId(input);
        if (!id) {
            showToast('❌ Invalid YouTube URL or video ID', 3000);
            return;
        }

        if (isDuplicate(videos, id)) {
            showToast('⚠️ Video already in your list', 2000);
            return;
        }

        loading.classList.add('active');
        try {
            const info = await fetchVideoInfo(id);
            const video = buildVideoObject(id, info);
            videos = addVideoToList(videos, video);
            saveVideos(videos);
            render();
            showToast('✅ Video added!', 2000);
            searchInput.value = '';
        } catch (err) {
            showToast('❌ Could not load video. Check the URL and try again.', 3000);
        } finally {
            loading.classList.remove('active');
        }
    }

    function removeVideo(index) {
        videos = removeVideoFromList(videos, index);
        saveVideos(videos);
        render();
        showToast('🗑 Video removed', 1500);
    }

    clearBtn.addEventListener('click', () => {
        if (videos.length === 0) return;
        if (confirm('Remove all videos?')) {
            videos = [];
            saveVideos(videos);
            render();
            playerSection.classList.remove('active');
            playerIframe.src = '';
            showToast('🗑 All videos cleared', 1500);
        }
    });

    refreshBtn.addEventListener('click', async () => {
        if (videos.length === 0) return;
        loading.classList.add('active');
        let success = 0;
        for (const v of videos) {
            try {
                const info = await fetchVideoInfo(v.id);
                v.title = info.title || v.title;
                v.author = info.author_name || v.author;
                v.thumbnail = info.thumbnail_url || v.thumbnail;
                success++;
            } catch {}
        }
        saveVideos(videos);
        render();
        loading.classList.remove('active');
        showToast(`🔄 Refreshed ${success} video(s)`, 2000);
    });

    addBtn.addEventListener('click', () => addVideo(searchInput.value.trim()));
    searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') addVideo(searchInput.value.trim());
    });

    function applyTheme(isLight) {
        document.documentElement.classList.toggle('light', isLight);
        themeToggle.textContent = isLight ? '🌙' : '☀️';
    }

    function toggleTheme() {
        const isLight = document.documentElement.classList.toggle('light');
        saveTheme(isLight);
        themeToggle.textContent = isLight ? '🌙' : '☀️';
    }

    // Restore saved theme
    if (loadTheme()) applyTheme(true);

    themeToggle.addEventListener('click', toggleTheme);

    videos = loadVideos();
    render();
</script>
</body>
</html>
