<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Downloader</title>
  <link rel="stylesheet" href="youtube-downloader.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <header>
      <div class="header-left">
        <svg class="logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.94 2C5.12 20 12 20 12 20s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/>
          <polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"/>
        </svg>
        <h1>YouTube Downloader</h1>
      </div>
      <button id="theme-toggle" class="theme-btn" aria-label="Toggle theme">🌙</button>
    </header>

    <div class="input-section">
      <p>Paste a YouTube video link to fetch available formats and download.</p>
      <div class="input-row">
        <input type="url" id="url-input" placeholder="https://youtube.com/watch?v=..." autofocus>
        <button class="btn btn-primary" id="fetch-btn">Fetch ▸</button>
      </div>
    </div>

    <div id="status" class="status"></div>

    <div id="loading" class="loading-overlay">
      <div class="spinner visible"></div>
      <p>Fetching video information…</p>
    </div>

    <div id="video-info" class="video-info">
      <img id="thumbnail" class="video-thumb" src="" alt="Video thumbnail">
      <div class="video-meta">
        <h2 id="video-title"></h2>
        <div class="uploader" id="video-uploader"></div>
        <div class="duration" id="video-duration"></div>
      </div>
    </div>

    <div id="formats-section" class="formats-section">
      <h3>Select format to download</h3>
      <div id="format-list" class="format-list"></div>
      <button class="btn btn-primary btn-full btn-icon" id="download-btn">
        ⬇ Download
      </button>
    </div>
  </div>

  <script src="youtube-downloader.js"></script>
</body>
</html>
