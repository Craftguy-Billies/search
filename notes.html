<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notebook · Notes</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="notes.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <header>
      <div class="header-left">
        <svg class="logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9"/>
          <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
        <h1>Notebook</h1>
      </div>
      <button id="theme-toggle" class="theme-btn" aria-label="Toggle theme">🌙</button>
    </header>

    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <input type="text" id="search-input" placeholder="Search notes…" spellcheck="false">
        <button class="btn btn-add" id="add-btn" title="New note">＋</button>
      </div>
      <div class="note-list" id="note-list">
        <div class="note-list-empty">No notes yet</div>
      </div>
    </div>

    <div class="editor" id="editor">
      <div class="editor-empty" id="editor-empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9"/>
          <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
        <p>Select a note or create a new one</p>
      </div>
      <div class="editor-active" id="editor-active" style="display:none">
        <div class="editor-toolbar">
          <input type="text" id="note-title" placeholder="Note title…" spellcheck="false">
          <div class="editor-actions">
            <span class="editor-meta" id="editor-meta"></span>
            <button class="btn btn-delete" id="delete-btn" title="Delete note">🗑</button>
          </div>
        </div>
        <textarea id="note-content" placeholder="Start writing…"></textarea>
      </div>
    </div>
  </div>

  <script src="notes.js"></script>
</body>
</html>
